<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyFit">
<meta name="theme-color" content="#080808">
<title>MyFit · Nuno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808; --bg1: #0f0f0f; --bg2: #141414; --bg3: #1a1a1a;
    --border: #1e1e1e; --text: #f0f0f0; --sub: #666; --muted: #333;
    --yellow: #F5C542; --blue: #4FC3F7; --green: #A5D6A7;
    --pink: #F48FB1; --purple: #CE93D8; --orange: #FF8A65;
    --font: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    --fontb: 'Barlow', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }
  button { font-family: var(--font); cursor: pointer; border: none; background: none; }
  input { font-family: var(--fontb); }
  ::-webkit-scrollbar { display: none; }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #header { padding: calc(var(--safe-top) + 12px) 16px 10px; background: var(--bg1); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #tabs { display: flex; background: var(--bg1); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #bottom-nav { display: flex; background: var(--bg1); border-top: 1px solid var(--border); padding-bottom: var(--safe-bot); flex-shrink: 0; }

  /* HEADER */
  .header-sub { font-size: 9px; letter-spacing: 4px; color: var(--sub); margin-bottom: 2px; }
  .header-title { font-size: 28px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
  .header-title span { color: var(--yellow); }
  .header-info { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* TABS (top) */
  .tab-btn { flex: 1; padding: 11px 0; font-size: 11px; font-family: var(--font); font-weight: 700; letter-spacing: 2px; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; }
  .tab-btn.active { color: var(--yellow); border-bottom-color: var(--yellow); }

  /* BOTTOM NAV */
  .nav-btn { flex: 1; padding: 10px 0; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 9px; letter-spacing: 1px; color: var(--muted); transition: color .15s; }
  .nav-btn.active { color: var(--yellow); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* DAY SELECTOR */
  .day-strip { padding: 12px 14px 0; overflow-x: auto; }
  .day-strip-inner { display: flex; gap: 7px; min-width: max-content; padding-bottom: 12px; }
  .day-pill { padding: 8px 13px; border-radius: 8px; border: 2px solid var(--border); font-size: 11px; font-weight: 700; letter-spacing: 1px; transition: all .15s; text-align: center; min-width: 52px; }
  .day-pill .dl { font-size: 11px; }
  .day-pill .dt { font-size: 9px; margin-top: 2px; opacity: .7; }

  /* WORKOUT CARD */
  .wk-header { padding: 14px 14px 8px; display: flex; justify-content: space-between; align-items: flex-start; }
  .wk-focus { font-size: 10px; letter-spacing: 3px; font-weight: 700; margin-bottom: 3px; }
  .wk-name { font-size: 24px; font-weight: 900; letter-spacing: -.5px; }
  .wk-pct { font-size: 28px; font-weight: 900; }
  .wk-count { font-size: 10px; color: var(--sub); }
  .progress-bar { height: 3px; background: var(--bg3); margin: 0 14px 14px; border-radius: 2px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }

  /* EXERCISE ROW */
  .ex-list { padding: 0 10px 16px; }
  .ex-row { display: flex; align-items: center; gap: 0; border-radius: 10px; margin-bottom: 8px; overflow: hidden; border: 1px solid var(--border); background: var(--bg1); transition: opacity .2s; }
  .ex-row.done { opacity: .4; }
  .ex-img { width: 72px; height: 72px; object-fit: cover; flex-shrink: 0; background: var(--bg2); }
  .ex-img-placeholder { width: 72px; height: 72px; flex-shrink: 0; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 26px; }
  .ex-body { flex: 1; padding: 10px 10px; min-width: 0; }
  .ex-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ex-muscle { font-size: 11px; color: var(--sub); margin-top: 2px; }
  .ex-detail { font-size: 12px; font-weight: 700; margin-top: 4px; }
  .ex-check { width: 52px; height: 72px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .check-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--muted); display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .check-circle.checked { border-color: transparent; }
  .check-circle .tick { font-size: 14px; font-weight: 900; color: #000; display: none; }
  .check-circle.checked .tick { display: block; }

  /* REST LOG */
  .rest-log { margin: 0 14px 16px; background: var(--bg1); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  .rest-log-head { padding: 10px 14px; font-size: 10px; letter-spacing: 3px; color: var(--sub); border-bottom: 1px solid var(--border); }
  .rest-log-body { padding: 12px 14px; }
  .log-inputs { display: flex; gap: 8px; }
  .log-input { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--bg3); background: var(--bg2); color: var(--text); font-size: 14px; outline: none; }
  .log-input:focus { border-color: var(--yellow); }
  .log-btn { padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; }
  .log-add-btn { width: 100%; padding: 11px; border: 1px dashed var(--bg3); border-radius: 8px; color: var(--sub); font-size: 13px; }
  .log-saved { font-size: 12px; color: var(--sub); margin-top: 8px; }

  /* REST DAY */
  .rest-day { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; }
  .rest-day .emoji { font-size: 56px; margin-bottom: 16px; }
  .rest-day .title { font-size: 26px; font-weight: 900; color: var(--muted); }
  .rest-day .sub { font-size: 13px; color: var(--muted); margin-top: 6px; font-family: var(--fontb); }

  /* NUTRITION */
  .nut-macros { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 14px 14px 0; }
  .macro-card { background: var(--bg1); border-radius: 8px; border: 1px solid var(--border); padding: 10px 6px; text-align: center; }
  .macro-label { font-size: 9px; letter-spacing: 2px; color: var(--sub); margin-bottom: 4px; }
  .macro-val { font-size: 22px; font-weight: 900; }
  .macro-unit { font-size: 9px; color: var(--muted); }
  .meal-list { padding: 14px; }
  .meal-row { margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  .meal-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; background: var(--bg1); }
  .meal-head-left { display: flex; align-items: center; gap: 10px; }
  .meal-time { font-size: 11px; font-weight: 700; min-width: 38px; }
  .meal-name { font-size: 14px; font-weight: 700; }
  .meal-kcal { font-size: 14px; font-weight: 700; }
  .meal-body { background: #0d0d0d; padding: 12px 14px; border-top: 1px solid var(--border); }
  .meal-item { font-size: 12px; color: #aaa; padding: 3px 0; border-bottom: 1px solid var(--bg3); font-family: var(--fontb); }
  .supps { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .supp-tag { font-size: 10px; padding: 3px 7px; border-radius: 4px; background: var(--bg3); color: #777; border: 1px solid #222; }
  .meal-macros { display: flex; gap: 14px; margin-top: 8px; }
  .meal-macro { font-size: 11px; color: #555; font-family: var(--fontb); }
  .meal-macro strong { color: #aaa; }
  .nut-notes { margin: 0 14px 24px; background: var(--bg1); border-radius: 10px; border: 1px solid var(--border); padding: 14px; }
  .nut-note-title { font-size: 10px; letter-spacing: 3px; color: var(--sub); margin-bottom: 10px; }
  .nut-note { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--bg3); }
  .nut-note-arrow { color: var(--yellow); font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .nut-note-text { font-size: 12px; color: #888; font-family: var(--fontb); line-height: 1.5; }

  /* REGISTO */
  .reg-section { padding: 14px; }
  .reg-title { font-size: 10px; letter-spacing: 3px; color: var(--sub); margin-bottom: 12px; }
  .week-card { background: var(--bg1); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
  .week-card-head { padding: 11px 14px; background: #111; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .week-key { font-size: 13px; font-weight: 700; }
  .week-weight { font-size: 14px; font-weight: 700; color: var(--yellow); }
  .week-table { width: 100%; border-collapse: collapse; }
  .week-table th { padding: 7px 14px; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-align: left; border-bottom: 1px solid var(--bg3); background: #0a0a0a; }
  .week-table td { padding: 9px 14px; font-size: 13px; border-bottom: 1px solid var(--bg3); }
  .week-total { padding: 9px 14px; font-size: 11px; color: var(--sub); background: #0a0a0a; }
  .week-total strong { color: #aaa; }
  .stats-card { background: var(--bg1); border-radius: 10px; border: 1px solid var(--border); padding: 14px; margin-bottom: 14px; }
  .stat-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--bg3); }
  .stat-label { font-size: 12px; color: var(--sub); font-family: var(--fontb); }
  .stat-val { font-size: 13px; font-weight: 700; }
  .empty-state { text-align: center; padding: 50px 20px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 700; color: var(--muted); }
  .empty-sub { font-size: 12px; color: var(--muted); margin-top: 5px; font-family: var(--fontb); }

  /* INSTALL BANNER */
  #install-banner { position: fixed; bottom: calc(56px + var(--safe-bot)); left: 12px; right: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,.6); }
  #install-banner.hidden { display: none; }
  .install-icon { font-size: 28px; flex-shrink: 0; }
  .install-text { flex: 1; }
  .install-title { font-size: 14px; font-weight: 700; }
  .install-sub { font-size: 11px; color: var(--sub); margin-top: 2px; font-family: var(--fontb); }
  .install-btn { padding: 8px 14px; border-radius: 8px; background: var(--yellow); color: #000; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .install-close { font-size: 18px; color: var(--muted); padding: 4px; flex-shrink: 0; }

  /* ARROW for chevron */
  .chevron { font-size: 12px; color: var(--muted); transition: transform .2s; }
  .chevron.open { transform: rotate(180deg); }

  /* iOS install hint */
  #ios-hint { position: fixed; bottom: calc(56px + var(--safe-bot) + 8px); left: 12px; right: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 14px 16px; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,.6); }
  #ios-hint.hidden { display: none; }
  .ios-hint-close { float: right; font-size: 18px; color: var(--muted); }
  .ios-hint-text { font-size: 13px; font-family: var(--fontb); color: #aaa; line-height: 1.6; }
  .ios-hint-text strong { color: var(--text); }
</style>
</head>

  </div>

    <button class="nav-btn" id="nav-registo" onclick="switchPage('registo')">
      <span class="nav-icon">📊</span><span>REGISTO</span>
    </button>
  </div>
</div>

<!-- INSTALL BANNER (Android/Desktop) -->
<div id="install-banner" class="hidden">
  <span class="install-icon">📱</span>
  <div class="install-text">
    <div class="install-title">Instalar MyFit</div>
    <div class="install-sub">Adicionar ao ecrã principal como app</div>
  </div>
  <button class="install-btn" onclick="doInstall()">Instalar</button>
  <button class="install-close" onclick="dismissInstall()">✕</button>
</div>

<!-- iOS INSTALL HINT -->
<div id="ios-hint" class="hidden">
  <button class="ios-hint-close" onclick="document.getElementById('ios-hint').classList.add('hidden')">✕</button>
  <div class="ios-hint-text">
    Para instalar no iPhone:<br>
    Toca em <strong>⎙ Partilhar</strong> → <strong>"Adicionar ao ecrã principal"</strong>
  </div>
</div>

        img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Seated_cable_row.jpg/320px-Seated_cable_row.jpg" },
      { name:"Chest Press (máquina)", detail:"3x 10–12 reps", muscle:"Peito",
        img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Chest_press_machine.jpg/320px-Chest_press_machine.jpg" },
    ]
  },
];

const WEEK_DAYS = ["SEG","TER","QUA","QUI","SEX","SÁB","DOM"];
const DAY_PLAN  = ["A","B","C","D","E","REST","REST"];

const NUTRITION = [
  { time:"07:45", label:"Pré-treino · Shake", kcal:420, p:35, c:50, f:10, color:"#F5C542",
    items:["30g proteína whey","6g creatina","1 banana","5 morangos","1 colher de mel","1 colher manteiga de amendoim"],
    supps:["Vit. D","Ómega 3","Zinco","Magnésio","Ashwagandha","Vitamínico"] },
  { time:"09:05", label:"Pós-treino", kcal:310, p:28, c:30, f:8, color:"#4FC3F7",
    items:["100g claras de ovo","1 ovo inteiro","1 café","1 pão c/ pouca manteiga"] },
  { time:"11:00", label:"Meio da manhã", kcal:80, p:1, c:20, f:0, color:"#A5D6A7",
    items:["1 fruta (maçã / laranja / pêra)"] },
  { time:"13:00", label:"Almoço", kcal:580, p:45, c:55, f:12, color:"#F48FB1",
    items:["150g proteína (frango / peixe / carne)","120g hidratos (arroz / massa / batata-doce)","Legumes à vontade"] },
  { time:"16:00", label:"Meio da tarde", kcal:150, p:15, c:10, f:3, color:"#CE93D8",
    items:["1 iogurte proteico"] },
  { time:"20:00", label:"Jantar", kcal:560, p:44, c:50, f:12, color:"#FF8A65",
    items:["150g proteína (peixe / frango / ovo)","120g hidratos","Vegetais","1 café"] },
];

const NUT_NOTES = [
  "Proteína: ~2g/kg = ~138g necessários. O teu plano dá ~168g — excelente para crescimento muscular.",
  "Creatina 6g/dia em fase de carga. Após 4 semanas, podes reduzir para 3–5g de manutenção.",
  "Hidratos antes do treino = energia. Hidratos depois = recuperação muscular.",
  "Com 50 anos a recuperação é mais lenta. 7–8h de sono é o teu anabolizante gratuito.",
  "Ashwagandha + Magnésio à noite otimizam cortisol e qualidade do sono.",
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════

function load(k, def) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; }
}
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

let currentPage = "treinos";
let activeDay = (() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; })();
let checks  = load("nuno_checks", {});
let weekLog = load("nuno_weeklog", {});
let openMeals = {};
let showLogForm = false;
let logInputWeight = "";
let logInputKcal   = "";

function getWeekKey() {
  const d = new Date(), jan1 = new Date(d.getFullYear(),0,1);
  const wn = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-S${String(wn).padStart(2,"0")}`;
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════

function switchPage(p) {
  currentPage = p;
  ["treinos","nutricao","registo"].forEach(n => {
    document.getElementById("page-"+n).style.display = n === p ? "block" : "none";
    document.getElementById("nav-"+n).classList.toggle("active", n === p);
  });
  if (p === "treinos")  renderTreinos();
  if (p === "nutricao") renderNutricao();
  if (p === "registo")  renderRegisto();
}

function switchTab(t) {} // reserved

// ═══════════════════════════════════════════════════════════
// RENDER: TREINOS
// ═══════════════════════════════════════════════════════════

function renderTreinos() {
  const el = document.getElementById("page-treinos");
  const plan = DAY_PLAN[activeDay];
  const wk   = WORKOUTS.find(w => w.id === plan);
  const wKey = getWeekKey();
  const thisWeek = weekLog[wKey] || {};

  let html = `<div class="day-strip"><div class="day-strip-inner">`;
  WEEK_DAYS.forEach((d, i) => {
    const p = DAY_PLAN[i];
    const w = WORKOUTS.find(x => x.id === p);
    const isActive = activeDay === i;
    const isRest = p === "REST";
    const bg = isActive ? (w?.color || "#222") : "transparent";
    const col = isActive ? (isRest ? "#fff" : "#000") : (isRest ? "#2a2a2a" : "#777");
    const border = isActive ? (w?.color || "#333") : "var(--border)";
    html += `<button class="day-pill" onclick="selectDay(${i})"
      style="background:${bg};color:${col};border-color:${border};">
      <div class="dl">${d}</div>
      <div class="dt">${isRest ? "REST" : p}</div>
    </button>`;
  });
  html += `</div></div>`;

  if (!wk) {
    html += `<div class="rest-day">
      <div class="emoji">💤</div>
      <div class="title">DIA DE DESCANSO</div>
      <div class="sub">Recupera. O músculo cresce agora.</div>
    </div>`;
  } else {
    const dayChecks = checks[activeDay] || {};
    const done = wk.exercises.filter((_, i) => dayChecks[i]).length;
    const pct  = Math.round(done / wk.exercises.length * 100);

    html += `
    <div class="wk-header">
      <div>
        <div class="wk-focus" style="color:${wk.color}">${wk.focus.toUpperCase()}</div>
        <div class="wk-name">${wk.name}</div>
      </div>
      <div style="text-align:right">
        <div class="wk-pct" style="color:${wk.color}">${pct}%</div>
        <div class="wk-count">${done}/${wk.exercises.length}</div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%;background:${wk.color}"></div>
    </div>
    <div class="ex-list">`;

    wk.exercises.forEach((ex, i) => {
      const isDone = !!dayChecks[i];
      html += `
      <div class="ex-row${isDone?" done":""}" onclick="toggleEx(${activeDay},${i})">
        <img class="ex-img" src="${ex.img}" alt="${ex.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="ex-img-placeholder" style="display:none">💪</div>
        <div class="ex-body">
          <div class="ex-name" style="${isDone?"text-decoration:line-through;color:var(--muted)":""}">${ex.name}</div>
          <div class="ex-muscle">${ex.muscle}</div>
          <div class="ex-detail" style="color:${wk.color}">${ex.detail}</div>
        </div>
        <div class="ex-check">
          <div class="check-circle${isDone?" checked":""}" style="${isDone?"background:"+wk.color:"border-color:"+(isDone?wk.color:"var(--muted)")}">
            <span class="tick">✓</span>
          </div>
        </div>
      </div>`;
    });

    html += `</div>`;

    // Log form
    html += `<div class="rest-log">
      <div class="rest-log-head">REGISTO DO TREINO DE HOJE</div>
      <div class="rest-log-body">`;

    if (!showLogForm) {
      html += `<button class="log-add-btn" onclick="openLogForm()">+ Registar calorias e peso</button>`;
    } else {
      html += `<div class="log-inputs">
        <input class="log-input" id="li-weight" type="number" inputmode="decimal" placeholder="Peso (kg)" value="${logInputWeight}" onchange="logInputWeight=this.value">
        <input class="log-input" id="li-kcal" type="number" inputmode="numeric" placeholder="Kcal gastas" value="${logInputKcal}" onchange="logInputKcal=this.value">
        <button class="log-btn" style="background:${wk.color};color:#000;font-weight:700;" onclick="saveLog()">💾</button>
      </div>`;
    }

    if (thisWeek.weight) {
      html += `<div class="log-saved">Peso esta semana: <strong>${thisWeek.weight} kg</strong></div>`;
    }

    html += `</div></div>`;
  }

  el.innerHTML = html;

  // Wake lock
  if ('wakeLock' in navigator && wk) {
    navigator.wakeLock.request('screen').catch(() => {});
  }
}

function selectDay(i) {
  activeDay = i;
  showLogForm = false;
  logInputWeight = "";
  logInputKcal = "";
  renderTreinos();
}

function toggleEx(day, i) {
  if (!checks[day]) checks[day] = {};
  checks[day][i] = !checks[day][i];
  save("nuno_checks", checks);
  renderTreinos();
}

function openLogForm() {
  showLogForm = true;
  renderTreinos();
  setTimeout(() => {
    const w = document.getElementById("li-weight");
    if (w) w.focus();
  }, 100);
}

function saveLog() {
  const wKey = getWeekKey();
  const wt = document.getElementById("li-weight")?.value || logInputWeight;
  const kc = document.getElementById("li-kcal")?.value || logInputKcal;
  if (!wt && !kc) return;
  if (!weekLog[wKey]) weekLog[wKey] = { entries: [] };
  if (wt) weekLog[wKey].weight = wt;
  weekLog[wKey].entries = weekLog[wKey].entries || [];
  weekLog[wKey].entries.push({
    day: WEEK_DAYS[activeDay],
    workout: DAY_PLAN[activeDay],
    kcal: kc,
    date: new Date().toLocaleDateString("pt-PT")
  });
  save("nuno_weeklog", weekLog);
  showLogForm = false;
  logInputWeight = ""; logInputKcal = "";
  renderTreinos();
}

// ═══════════════════════════════════════════════════════════
// RENDER: NUTRIÇÃO
// ═══════════════════════════════════════════════════════════

function renderNutricao() {
  const el = document.getElementById("page-nutricao");
  const totKcal = NUTRITION.reduce((s,m) => s+m.kcal, 0);
  const totP    = NUTRITION.reduce((s,m) => s+m.p, 0);
  const totC    = NUTRITION.reduce((s,m) => s+m.c, 0);
  const totF    = NUTRITION.reduce((s,m) => s+m.f, 0);

  let html = `<div class="nut-macros">
    <div class="macro-card"><div class="macro-label">KCAL</div><div class="macro-val" style="color:#F5C542">${totKcal}</div><div class="macro-unit"> </div></div>
    <div class="macro-card"><div class="macro-label">PROT</div><div class="macro-val" style="color:#4FC3F7">${totP}</div><div class="macro-unit">g</div></div>
    <div class="macro-card"><div class="macro-label">HC</div><div class="macro-val" style="color:#A5D6A7">${totC}</div><div class="macro-unit">g</div></div>
    <div class="macro-card"><div class="macro-label">GORD</div><div class="macro-val" style="color:#F48FB1">${totF}</div><div class="macro-unit">g</div></div>
  </div>
  <div class="meal-list">`;

  NUTRITION.forEach((m, i) => {
    const isOpen = !!openMeals[i];
    html += `<div class="meal-row">
      <div class="meal-head" onclick="toggleMeal(${i})">
        <div class="meal-head-left">
          <span class="meal-time" style="color:${m.color}">${m.time}</span>
          <span class="meal-name">${m.label}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="meal-kcal" style="color:${m.color}">${m.kcal} kcal</span>
          <span class="chevron${isOpen?" open":""}">▼</span>
        </div>
      </div>`;
    if (isOpen) {
      html += `<div class="meal-body">
        ${m.items.map(it => `<div class="meal-item">• ${it}</div>`).join("")}`;
      if (m.supps) {
        html += `<div style="margin-top:10px;font-size:9px;letter-spacing:2px;color:var(--sub);margin-bottom:6px">SUPLEMENTOS</div>
          <div class="supps">${m.supps.map(s => `<span class="supp-tag">${s}</span>`).join("")}</div>`;
      }
      html += `<div class="meal-macros">
        <span class="meal-macro">P: <strong>${m.p}g</strong></span>
        <span class="meal-macro">HC: <strong>${m.c}g</strong></span>
        <span class="meal-macro">G: <strong>${m.f}g</strong></span>
      </div></div>`;
    }
    html += `</div>`;
  });

  html += `</div>
  <div class="nut-notes">
    <div class="nut-note-title">NOTAS · 50 ANOS</div>
    ${NUT_NOTES.map(n => `<div class="nut-note">
      <span class="nut-note-arrow">→</span>
      <span class="nut-note-text">${n}</span>
    </div>`).join("")}
  </div>`;

  el.innerHTML = html;
}

function toggleMeal(i) {
  openMeals[i] = !openMeals[i];
  renderNutricao();
}

// ═══════════════════════════════════════════════════════════
// RENDER: REGISTO
// ═══════════════════════════════════════════════════════════

function renderRegisto() {
  const el = document.getElementById("page-registo");
  const keys = Object.keys(weekLog).sort((a,b) => b.localeCompare(a));

  let html = `<div class="reg-section">
    <div class="reg-title">HISTÓRICO SEMANAL</div>`;

  if (keys.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-icon">📊</div>
      <div class="empty-title">Ainda sem dados</div>
      <div class="empty-sub">Regista peso e calorias no separador Treinos</div>
    </div>`;
  } else {
    keys.forEach(wk => {
      const data = weekLog[wk];
      const entries = data.entries || [];
      const totalKcal = entries.reduce((s,e) => s + (parseFloat(e.kcal)||0), 0);
      html += `<div class="week-card">
        <div class="week-card-head">
          <span class="week-key">${wk}</span>
          ${data.weight ? `<span class="week-weight">${data.weight} kg</span>` : ""}
        </div>`;
      if (entries.length > 0) {
        html += `<table class="week-table">
          <thead><tr>
            <th>Dia</th><th>Treino</th><th>Data</th><th>Kcal</th>
          </tr></thead><tbody>`;
        entries.forEach(e => {
          html += `<tr>
            <td style="font-weight:700;color:var(--yellow)">${e.day}</td>
            <td style="color:var(--sub)">${e.workout||"—"}</td>
            <td style="color:var(--sub);font-size:11px">${e.date}</td>
            <td style="font-weight:700">${e.kcal ? e.kcal+" kcal" : "—"}</td>
          </tr>`;
        });
        html += `</tbody></table>
        <div class="week-total">Total semanal: <strong>${totalKcal.toFixed(0)} kcal gastas</strong></div>`;
      } else {
        html += `<div style="padding:12px 14px;font-size:12px;color:var(--muted)">Sem registos de treinos nesta semana.</div>`;
      }
      html += `</div>`;
    });
  }

  html += `<div class="stats-card">
    <div class="reg-title">MÉTRICAS BASE</div>
    ${[
      ["Peso atual","69 kg"],
      ["Altura","1.67 m"],
      ["IMC","24.7 — Normal"],
      ["TDEE estimado","~2 200 kcal/dia"],
      ["Calorias plano","2 100 kcal/dia"],
      ["Superavit est.","−100 kcal (ajustar snacks)"],
    ].map(([l,v]) => `<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-val">${v}</span></div>`).join("")}
  </div>
  <div style="padding-bottom:24px"></div>
  </div>`;

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// PWA / INSTALL
// ═══════════════════════════════════════════════════════════

let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").classList.remove("hidden");
});

window.addEventListener("appinstalled", () => {
  document.getElementById("install-banner").classList.add("hidden");
});

function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById("install-banner").classList.add("hidden");
  });
}

function dismissInstall() {
  document.getElementById("install-banner").classList.add("hidden");
}

// iOS detection — show manual hint
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone;
if (isIOS) {
  setTimeout(() => {
    document.getElementById("ios-hint").classList.remove("hidden");
  }, 2000);
}

document.getElementById("header-date").textContent =
  new Date().toLocaleDateString("pt-PT", { weekday:"long", day:"numeric", month:"long" });

switchPage("treinos");
</script>
